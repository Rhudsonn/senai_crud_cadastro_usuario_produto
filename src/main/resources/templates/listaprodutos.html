<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">Template</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Abrir menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/home}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/usuariolista}">Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/produto}">Produtos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}">Sair</a>
                </li>
            </ul>
        </div>
    </div>
</nav>


<main class="container py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
            <h1 class="h3 mb-1">Produto</h1>
            <p class="text-secondary mb-0">Lista de produtos cadastrados no sistema.</p>
        </div>


        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-primary">
                        <tr>
                            <th scope="col">nome produto</th>
                            <th scope="col">Descrição</th>
                            <th scope="col">Preço</th>
                            <th scope="col">Quantidade</th>
                            <th scope="col" class="text-end">Acoes</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="produtos : ${produto}">
                            <td th:text="${produtos.nomeProduto}">...</td>
                            <td th:text="${produtos.descricao}">...</td>
                            <td th:text="${produtos.preco}">...</td>
                            <td th:text="${produtos.quantidade}">...</td>
                            <td class="text-end">
                                <a class="btn btn-sm btn-outline-primary" th:href="@{/produtoatualizar/{id}(id=${produtos.id})}">Editar</a>
                                <button th:data-id="${produtos.id}" class="excluir btn btn-sm btn-outline-danger">Excluir</button>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(produto)}">
                            <td colspan="5" class="text-center text-secondary py-4">Nenhum produto cadastrado.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</main>

<!-- Inclua o script do excluir_usuario.js -->
<script src="/excluir_produto.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
