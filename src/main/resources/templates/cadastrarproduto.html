<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">Template</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Abrir menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menuPrincipal">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" th:href="@{/home}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/usuariolista}">Usuarios</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/produto}">Produto</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/login}">Sair</a>
        </li>
      </ul>
    </div>
  </div>
</nav>


<main class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="h3 mb-1">Cadastrar produto</h1>
          <p class="text-secondary mb-0">Preencha os dados para criar um novo produto.</p>
        </div>
      </div>

      <div class="alert alert-danger" role="alert" th:if="${erro}" th:text="${erro}">
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <form method="post" th:action="@{/cadastrarproduto}" th:object="${produto}" >

            <div class="mb-3">
              <label for="nomeProduto" class="form-label">Nome do produto</label>
              <input type="text" class="form-control" id="nomeProduto" th:field="*{nomeProduto}" placeholder="Digite o nome do produto" required>
              <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nomeProduto')}" th:errors="*{nomeProduto}">Erro no nome do produto</div>
            </div>

            <div class="mb-3">
              <label for="descricao" class="form-label">Descrição</label>
              <input type="text" class="form-control" id="descricao" th:field="*{descricao}" placeholder="Digite a descrição do produto" required>
              <div class="text-danger small mt-1" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}">Erro na descrição do produto</div>
            </div>

            <div class="mb-3">
              <label for="preco" class="form-label">Preço do produto</label>
              <input type="number" step="0.01" class="form-control" id="preco" th:field="*{preco}" placeholder="Digite o preço do produto" required>
              <div class="text-danger small mt-1" th:if="${#fields.hasErrors('preco')}" th:errors="*{preco}">Erro no preço do produto</div>
            </div>

            <div class="mb-3">
              <label for="quantidade" class="form-label">Informe a quantidade</label>
              <input type="number" class="form-control" id="quantidade" th:field="*{quantidade}" placeholder="Digite a quantidade do produto" required>
              <div class="text-danger small mt-1" th:if="${#fields.hasErrors('quantidade')}" th:errors="*{quantidade}">Erro na quantidade do produto</div>
            </div>

            <div class="d-flex justify-content-end gap-2">
              <a class="btn btn-outline-secondary" th:href="@{/produto}">Cancelar</a>
              <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
